services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db-master
    env_file:
      - .env
    networks:
      - public
      - private

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - public

  db-master:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - master_data:/var/lib/postgresql/data
    networks:
      - private

  db-slave:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - slave_data:/var/lib/postgresql/data
    networks:
      - private

volumes:
  master_data:
  slave_data:

networks:
  public:
  private:
